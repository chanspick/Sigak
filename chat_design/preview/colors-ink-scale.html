<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:22px;background:var(--color-paper);font-family:var(--font-sans);color:var(--color-ink)}.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}.cell{height:64px;position:relative;display:flex;align-items:flex-end;padding:6px}.cell b{font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:1px}.inv{height:64px;display:flex;align-items:flex-end;padding:6px;color:var(--color-paper);font-size:10px;letter-spacing:1px;font-weight:600}.cap{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;opacity:0.4;margin:14px 0 6px}</style></head><body>

<div class="grid" style="background:#000;padding:8px;gap:8px">
