<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--color-paper);color:var(--color-ink);font-family:var(--font-sans)}.group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}button{padding:9px 14px;border-radius:999px;font-family:var(--font-sans);font-size:13px;line-height:1;letter-spacing:-0.005em;cursor:pointer}.off{background:transparent;color:#000;border:0.5px solid rgba(0,0,0,0.15)}.on{background:#000;color:#F3F0EB;border:0.5px solid #000}.cap{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;opacity:0.4;margin-bottom:8px}</style></head><body>
<div class="cap">Pill group — single select</div>
<div class="group">
  <button class="off">편안한 인상</button>
  <button class="on">세련되고 거리감 있는 인상</button>
  <button class="off">공들인 인상</button>
  <button class="off">무심한데 센스 있는</button>
</div>
<div class="cap">Pill group — multi</div>
<div class="group">
  <button class="on">쿨뮤트</button>
  <button class="off">웜</button>
  <button class="on">모던</button>
  <button class="off">클래식</button>
  <button class="off">에디토리얼</button>
</div>
</body></html>
