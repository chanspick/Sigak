<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--color-paper);color:var(--color-ink);font-family:var(--font-sans)}.cap{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;opacity:0.4;margin-bottom:10px}.stack{display:flex;gap:20px;align-items:flex-start}.bubble{padding:11px 14px;font-size:14px;line-height:1.45;max-width:260px;letter-spacing:-0.005em}.ai{background:#F4F4F5;color:#000;border-radius:14px 14px 14px 2px}.me{background:#111827;color:#fff;border-radius:14px 14px 2px 14px;align-self:flex-end}.col{display:flex;flex-direction:column;gap:4px}.dots{display:flex;gap:3px;padding:12px 14px;background:#F4F4F5;border-radius:14px 14px 14px 2px}.dots span{width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,0.4);animation:b 1.2s infinite ease-in-out}.dots span:nth-child(2){animation-delay:0.15s}.dots span:nth-child(3){animation-delay:0.3s}@keyframes b{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-2px)}}</style></head><body>
<!--
  Sia bubble preview (Persona B). 샘플: 세션 #4 v2 §3.2 만재 M1 결합 출력.
-->
<div class="cap">Sia bubble system — 1 sentence per bubble (Persona B)</div>
<div class="stack"><div class="col">
  <div class="bubble ai">만재님 인스타 좀 들여다봤어요.</div>
  <div class="bubble ai">스무 장 넘게 올리셨는데 만재님 얼굴 나온 건 두 장이더라구요.</div>
  <div class="bubble ai">원래 본인 잘 안 찍으시는 편이에요?</div>
  <div class="dots"><span></span><span></span><span></span></div>
</div>
<div class="col" style="flex:1;align-items:flex-end">
  <div class="bubble me">아 네네!</div>
</div></div>
</body></html>
