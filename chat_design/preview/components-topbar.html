<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:0;background:#1a1a1a}.frame{max-width:440px;margin:0 auto;background:var(--color-paper);min-height:220px}.top{height:52px;background:#000;color:#F3F0EB;display:flex;align-items:center;justify-content:center;position:relative}.sigak{font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:6px}.back{position:absolute;left:0;top:0;width:52px;height:52px;display:flex;align-items:center;justify-content:center}.right{position:absolute;right:20px;top:0;height:100%;display:flex;align-items:center;gap:16px;color:#F3F0EB;font-size:13px}.av{width:28px;height:28px;border-radius:50%;background:rgba(243,240,235,0.15);display:flex;align-items:center;justify-content:center;font-size:11px}.plus{width:28px;height:28px;display:flex;align-items:center;justify-content:center}</style></head><body>
<div class="frame">
  <div class="top">
    <button class="back" style="background:transparent;border:none;cursor:pointer"><svg width="10" height="16"><path d="M8 1L1 8l7 7" stroke="#F3F0EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/></svg></button>
    <span class="sigak">SIGAK</span>
  </div>
  <div class="top" style="margin-top:20px">
    <div style="position:absolute;left:20px;color:#F3F0EB" class="sigak">SIGAK</div>
    <div class="right">
      <span style="font-variant-numeric:tabular-nums;opacity:0.85">5</span>
      <div class="av">•</div>
      <div class="plus"><svg width="18" height="18"><path d="M9 2v14M2 9h14" stroke="#F3F0EB" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    </div>
  </div>
</div>
</body></html>
