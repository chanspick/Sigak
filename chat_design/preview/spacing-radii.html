<!doctype html><html lang="ko"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--color-paper);color:var(--color-ink);font-family:var(--font-sans)}.row{display:flex;gap:18px;align-items:center;margin-bottom:14px}.box{background:rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:center;font-size:10px;color:#000}.cap{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;opacity:0.4;width:110px}</style></head><body>
