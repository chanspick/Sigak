<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGAK — 로딩</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable.css">
<style>
:root {
  --bg: #F5F1EB;
  --ink: #2D2D2D;
  --ink-body: #4A4540;
  --fog: #888888;
  --ember: #b54b2b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { -webkit-font-smoothing: antialiased; }
body {
  font-family: 'Pretendard Variable', -apple-system, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.loading-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px;
  text-align: center;
}

/* Logo */
.logo-icon {
  width: 60px; height: 60px;
  margin-bottom: 40px;
}

/* Text */
.loading-text {
  font-family: 'Pretendard Variable', sans-serif;
  font-size: 16px;
  color: var(--ink-body);
  line-height: 1.7;
  margin-bottom: 28px;
  letter-spacing: -0.005em;
}

/* Dots */
.loading-dots {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 36px;
}
.loading-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--ember);
  animation: dotPulse 1.4s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.22s; }
.loading-dots span:nth-child(3) { animation-delay: 0.44s; }

@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.25; transform: scale(0.75); }
  40%            { opacity: 1;    transform: scale(1); }
}

/* Sub hint */
.loading-hint {
  font-size: 12px;
  color: var(--fog);
  letter-spacing: -0.003em;
}
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="sigak-logo" viewBox="0 0 40 40">
    <rect width="40" height="40" rx="7" fill="#1a1a1a"/>
    <g stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round">
      <line x1="20" y1="6" x2="20" y2="13"/>
      <path d="M 6 19.5 Q 20 11.5 34 19.5 Q 20 27.5 6 19.5 Z"/>
      <circle cx="20" cy="19.5" r="2.6"/>
    </g>
    <path d="M 20 22.5 C 18.4 25, 17.4 28, 17.4 30 C 17.4 31.9, 18.6 32.8, 20 32.8 C 21.4 32.8, 22.6 31.9, 22.6 30 C 22.6 28, 21.6 25, 20 22.5 Z" fill="#ffffff"/>
  </symbol>
</svg>

<div class="loading-wrap">
  <svg class="logo-icon" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <rect width="40" height="40" rx="7" fill="#1a1a1a"/>
    <g stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round">
      <line x1="20" y1="6" x2="20" y2="13"/>
      <path d="M 6 19.5 Q 20 11.5 34 19.5 Q 20 27.5 6 19.5 Z"/>
      <circle cx="20" cy="19.5" r="2.6"/>
    </g>
    <path d="M 20 22.5 C 18.4 25, 17.4 28, 17.4 30 C 17.4 31.9, 18.6 32.8, 20 32.8 C 21.4 32.8, 22.6 31.9, 22.6 30 C 22.6 28, 21.6 25, 20 22.5 Z" fill="#ffffff"/>
  </svg>

  <p class="loading-text">sia가 피드를 분석중이에요.</p>

  <div class="loading-dots">
    <span></span><span></span><span></span>
  </div>

  <p class="loading-hint">최대 30초 정도 걸릴 수 있어요</p>
</div>

</body>
</html>
