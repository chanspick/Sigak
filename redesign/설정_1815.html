<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGAK — 설정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable.css">
<style>
/* ============================================================
   BASE
============================================================ */
:root {
  --bg: #F5F1EB;
  --bg-soft: #EDE8DF;
  --ink: #2D2D2D;
  --ink-soft: #3D3730;
  --ink-body: #4A4540;
  --fog: #888888;
  --mist: #D4CEC4;
  --rule: #E5E0D7;
  --ember: #b54b2b;
  --ember-softer: #f8ede8;
  --radius-pill: 100px;
  --radius-card: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { font-family: 'Pretendard Variable', -apple-system, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
::selection { background: var(--ember); color: var(--bg); }

/* ============================================================
   BRAND LOGO
============================================================ */
.brand-logo    { width: 22px; height: 22px; flex-shrink: 0; display: inline-block; vertical-align: middle; }
.brand-logo.sm { width: 16px; height: 16px; }

/* ============================================================
   TOP NAV
============================================================ */
.topnav {
  padding: 28px 24px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--rule);
  max-width: 480px; margin: 0 auto;
}
.topnav-left  { flex: 1; font-family: 'Pretendard Variable', sans-serif; font-size: 13.5px; color: var(--ink-soft); font-weight: 500; cursor: pointer; }
.topnav-center { font-family: 'Noto Serif KR', serif; font-weight: 500; font-size: 15px; letter-spacing: -0.005em; color: var(--ink); display: inline-flex; align-items: center; gap: 7px; }
.topnav-right { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }

/* 토큰 카운트 pill */
.token-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--ink); color: var(--bg);
  border-radius: var(--radius-pill);
  padding: 5px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
  cursor: pointer;
}
.token-pill-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ember); flex-shrink: 0;
}

/* ============================================================
   PROFILE SECTION
============================================================ */
.profile-section {
  max-width: 480px; margin: 0 auto;
  padding: 32px 24px 28px;
  display: flex; align-items: center; gap: 18px;
  border-bottom: 1px solid var(--rule);
}
.profile-avatar {
  width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #e8d9c8, #b8a58a);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.profile-avatar svg { opacity: 0.5; }
.profile-info { min-width: 0; }
.profile-name {
  font-family: 'Noto Serif KR', serif;
  font-weight: 500; font-size: 18px;
  color: var(--ink); letter-spacing: -0.015em;
  margin-bottom: 4px;
}
.profile-email {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--fog);
  letter-spacing: 0.02em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ============================================================
   TOKEN BALANCE
============================================================ */
.token-section {
  max-width: 480px; margin: 0 auto;
  padding: 24px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--rule);
}
.token-left {}
.token-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--fog);
  margin-bottom: 6px;
}
.token-amount {
  display: flex; align-items: baseline; gap: 6px;
}
.token-number {
  font-family: 'Noto Serif KR', serif;
  font-size: 32px; font-weight: 500;
  color: var(--ink); letter-spacing: -0.02em; line-height: 1;
}
.token-unit {
  font-family: 'Pretendard Variable', sans-serif;
  font-size: 13px; color: var(--fog);
  letter-spacing: -0.005em;
}
.charge-btn {
  padding: 12px 22px;
  background: var(--ink); color: var(--bg);
  border: none; border-radius: var(--radius-pill);
  font-family: 'Pretendard Variable', sans-serif;
  font-size: 14px; font-weight: 600;
  letter-spacing: -0.01em; cursor: pointer;
  transition: all 0.2s ease; flex-shrink: 0;
}
.charge-btn:hover { background: #000; transform: translateY(-1px); }

/* ============================================================
   SETTINGS LIST
============================================================ */
.settings-wrap { max-width: 480px; margin: 0 auto; }

.settings-group {
  border-bottom: 1px solid var(--rule);
  padding: 8px 0;
}

.settings-item {
  display: flex; align-items: center;
  padding: 18px 24px;
  cursor: pointer;
  transition: background 0.15s ease;
  gap: 14px;
}
.settings-item:hover { background: var(--bg-soft); }

.settings-item-body { flex: 1; min-width: 0; }
.settings-item-title {
  font-family: 'Pretendard Variable', sans-serif;
  font-size: 15px; font-weight: 500;
  color: var(--ink); letter-spacing: -0.01em;
  margin-bottom: 2px;
}
.settings-item-sub {
  font-size: 12.5px; color: var(--fog);
  line-height: 1.55; letter-spacing: -0.003em;
  word-break: keep-all; margin-top: 4px;
}
.settings-item-chevron {
  color: var(--mist); font-size: 13px; flex-shrink: 0;
  transition: color 0.15s ease;
}
.settings-item:hover .settings-item-chevron { color: var(--fog); }

/* 위험 액션 (로그아웃, 계정 탈퇴) */
.settings-item.danger .settings-item-title { color: var(--ember); }
.settings-item.danger .settings-item-chevron { color: #e8b4a6; }
.settings-item.danger:hover .settings-item-chevron { color: var(--ember); }
</style>
</head>
<body>

<!-- SVG DEFS -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="sigak-logo" viewBox="0 0 40 40">
    <rect width="40" height="40" rx="7" fill="#1a1a1a"/>
    <g stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round">
      <line x1="20" y1="6" x2="20" y2="13"/>
      <path d="M 6 19.5 Q 20 11.5 34 19.5 Q 20 27.5 6 19.5 Z"/>
      <circle cx="20" cy="19.5" r="2.6"/>
    </g>
    <path d="M 20 22.5 C 18.4 25, 17.4 28, 17.4 30 C 17.4 31.9, 18.6 32.8, 20 32.8 C 21.4 32.8, 22.6 31.9, 22.6 30 C 22.6 28, 21.6 25, 20 22.5 Z" fill="#ffffff"/>
  </symbol>
  <!-- 기본 아바타 아이콘 -->
  <symbol id="avatar-icon" viewBox="0 0 40 40">
    <circle cx="20" cy="16" r="7" fill="#b8a58a"/>
    <path d="M6 36 C6 28 34 28 34 36" fill="#b8a58a"/>
  </symbol>
</svg>

<!-- TOP NAV -->
<div class="topnav">
  <span class="topnav-left">← 뒤로</span>
  <div class="topnav-center">
    <svg class="brand-logo sm"><use href="#sigak-logo"/></svg>
    <span>sigak</span>
  </div>
  <div class="topnav-right">
    <div class="token-pill">
      <div class="token-pill-dot"></div>
      <span id="navTokenCount">270</span>
    </div>
  </div>
</div>

<!-- PROFILE SECTION -->
<div class="profile-section">
  <div class="profile-avatar">
    <svg width="32" height="32"><use href="#avatar-icon"/></svg>
  </div>
  <div class="profile-info">
    <div class="profile-name">최진규</div>
    <div class="profile-email">cjk369369@naver.com</div>
  </div>
</div>

<!-- TOKEN BALANCE -->
<div class="token-section">
  <div class="token-left">
    <div class="token-amount">
      <span class="token-number" id="tokenNumber">270</span>
      <span class="token-unit">토큰</span>
    </div>
  </div>
  <button class="charge-btn">충전하기</button>
</div>

<!-- SETTINGS LIST -->
<div class="settings-wrap">

  <!-- 계정 설정 그룹 -->
  <div class="settings-group">
    <div class="settings-item">
      <div class="settings-item-body">
        <div class="settings-item-title">인스타그램 핸들</div>
        <div class="settings-item-sub">등록된 인스타그램을 변경할 수 있어요.</div>
      </div>
      <span class="settings-item-chevron">›</span>
    </div>
  </div>

  <!-- 약관/정책 그룹 -->
  <div class="settings-group">
    <div class="settings-item">
      <div class="settings-item-body">
        <div class="settings-item-title">이용약관</div>
      </div>
      <span class="settings-item-chevron">›</span>
    </div>
    <div class="settings-item">
      <div class="settings-item-body">
        <div class="settings-item-title">개인정보처리방침</div>
      </div>
      <span class="settings-item-chevron">›</span>
    </div>
    <div class="settings-item">
      <div class="settings-item-body">
        <div class="settings-item-title">환불 정책</div>
      </div>
      <span class="settings-item-chevron">›</span>
    </div>
  </div>

  <!-- 위험 액션 그룹 -->
  <div class="settings-group">
    <div class="settings-item danger">
      <div class="settings-item-body">
        <div class="settings-item-title">로그아웃</div>
      </div>
      <span class="settings-item-chevron">›</span>
    </div>
    <div class="settings-item danger">
      <div class="settings-item-body">
        <div class="settings-item-title">계정 탈퇴</div>
        <div class="settings-item-sub">운영팀에 이메일로 요청이 전송되며, 확인 후 7일 내 처리됩니다.</div>
      </div>
      <span class="settings-item-chevron">›</span>
    </div>
  </div>

</div>

</body>
</html>
