<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGAK — 사진 업로드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendardvariable.css">
<style>
/* ============================================================
   BASE
============================================================ */
:root {
  --bg: #F5F1EB;
  --bg-soft: #EDE8DF;
  --ink: #2D2D2D;
  --ink-soft: #3D3730;
  --ink-body: #4A4540;
  --fog: #888888;
  --mist: #D4CEC4;
  --rule: #E5E0D7;
  --ember: #b54b2b;
  --ember-softer: #f8ede8;
  --radius-pill: 100px;
  --radius-card: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body { font-family: 'Pretendard Variable', -apple-system, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
::selection { background: var(--ember); color: var(--bg); }

/* ============================================================
   TOP NAV
============================================================ */
.topnav {
  padding: 28px 24px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--rule);
  max-width: 480px; margin: 0 auto;
}
.topnav-left   { flex: 1; font-family: 'Pretendard Variable', sans-serif; font-size: 13.5px; color: var(--ink-soft); font-weight: 500; cursor: pointer; }
.topnav-center { font-family: 'Noto Serif KR', serif; font-weight: 500; font-size: 15px; letter-spacing: -0.005em; color: var(--ink); display: inline-flex; align-items: center; gap: 7px; }
.topnav-right  { flex: 1; }

.brand-logo    { width: 22px; height: 22px; flex-shrink: 0; display: inline-block; vertical-align: middle; }
.brand-logo.sm { width: 16px; height: 16px; }

/* ============================================================
   PAGE CONTENT
============================================================ */
.page-wrap { max-width: 440px; margin: 0 auto; padding: 44px 24px 80px; }

/* Completion badge */
.done-badge {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--bg-soft);
  border: 1px solid var(--rule);
  border-radius: var(--radius-pill);
  padding: 7px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; letter-spacing: 0.12em;
  color: var(--fog); text-transform: uppercase;
  margin-bottom: 20px;
}
.done-badge .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4CAF50; flex-shrink: 0;
}

/* Headline */
.upload-headline {
  font-family: 'Noto Serif KR', serif;
  font-size: 24px; font-weight: 700;
  color: var(--ink); line-height: 1.42;
  letter-spacing: -0.022em;
  margin-bottom: 10px;
}
.upload-sub {
  font-size: 14px; color: var(--fog);
  line-height: 1.65; letter-spacing: -0.005em;
  margin-bottom: 36px;
}




/* ============================================================
   PHOTO SLOTS
============================================================ */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}

.photo-slot {
  aspect-ratio: 3/4;
  border-radius: 12px;
  border: 1.5px dashed var(--mist);
  background: var(--bg-soft);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: border-color 0.2s ease, background 0.2s ease;
  position: relative;
  overflow: hidden;
}
.photo-slot:hover {
  border-color: var(--ember);
  background: var(--ember-softer);
}
.photo-slot:hover .slot-icon { color: var(--ember); }

/* Slot number */
.slot-num {
  position: absolute; top: 10px; left: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.14em;
  color: var(--mist);
}
.photo-slot:hover .slot-num { color: var(--ember); opacity: 0.6; }

/* Plus icon */
.slot-icon {
  font-size: 22px; color: var(--mist);
  line-height: 1; transition: color 0.2s ease;
  margin-top: 16px;
}

/* Slot label */
.slot-label {
  font-size: 11px; color: var(--mist);
  letter-spacing: -0.005em;
  transition: color 0.2s ease;
}
.photo-slot:hover .slot-label { color: var(--ember); }

/* Uploaded state */
.photo-slot.uploaded {
  border: 1.5px solid var(--rule);
  background: transparent;
}
.photo-slot.uploaded .slot-preview {
  position: absolute; inset: 0;
  object-fit: cover; width: 100%; height: 100%;
  border-radius: 10px;
}
.photo-slot.uploaded .remove-btn {
  position: absolute; top: 7px; right: 7px;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(45,45,45,0.65); color: #fff;
  font-size: 12px; line-height: 22px; text-align: center;
  cursor: pointer; display: none;
  font-family: 'Pretendard Variable', sans-serif;
}
.photo-slot.uploaded:hover .remove-btn { display: block; }

/* Hidden real file input */
.photo-slot input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
}

/* Hint below dots */
.upload-hint {
  font-size: 12.5px; color: var(--fog);
  text-align: center; letter-spacing: -0.005em;
  margin-top: 4px; margin-bottom: 32px;
  line-height: 1.5;
}

/* Count indicator */
.upload-count {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-bottom: 10px;
}
.count-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--mist); transition: background 0.2s ease;
}
.count-dot.filled { background: var(--ember); }

/* CTA token cost label */
.cta-token-label {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.08em;
  color: var(--fog);
  margin-top: 10px;
  min-height: 16px;
}
/* ============================================================
   CTA
============================================================ */
.cta-primary {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 17px 24px;
  background: var(--mist); color: #fff;
  border: none; border-radius: var(--radius-pill);
  font-family: 'Pretendard Variable', sans-serif; font-size: 15px; font-weight: 600;
  letter-spacing: -0.012em; cursor: not-allowed;
  transition: all 0.25s ease;
}
.cta-primary.ready {
  background: var(--ink); cursor: pointer;
}
.cta-primary.ready:hover { background: #000; transform: translateY(-1px); }
</style>
</head>
<body>

<!-- SVG LOGO SYMBOL -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="sigak-logo" viewBox="0 0 40 40">
    <rect width="40" height="40" rx="7" fill="#1a1a1a"/>
    <g stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round">
      <line x1="20" y1="6" x2="20" y2="13"/>
      <path d="M 6 19.5 Q 20 11.5 34 19.5 Q 20 27.5 6 19.5 Z"/>
      <circle cx="20" cy="19.5" r="2.6"/>
    </g>
    <path d="M 20 22.5 C 18.4 25, 17.4 28, 17.4 30 C 17.4 31.9, 18.6 32.8, 20 32.8 C 21.4 32.8, 22.6 31.9, 22.6 30 C 22.6 28, 21.6 25, 20 22.5 Z" fill="#ffffff"/>
  </symbol>
</svg>

<!-- TOP NAV -->
<div class="topnav">
  <span class="topnav-left">← 뒤로</span>
  <div class="topnav-center">
    <svg class="brand-logo sm"><use href="#sigak-logo"/></svg>
    <span>sigak</span>
  </div>
  <span class="topnav-right"></span>
</div>

<!-- PAGE CONTENT -->
<div class="page-wrap">

  <h2 class="upload-headline">
    피드와 추구미 분석이<br>완료되었어요!
  </h2>
  <p class="upload-sub">
    정밀 분석 받고 싶은 피드, 사진이나 프사를<br>1장 이상 올려주세요
  </p>


  <!-- Photo upload slots -->
  <div class="photo-grid" id="photoGrid">

    <div class="photo-slot" id="slot0">
      <input type="file" accept="image/*" data-slot="0">
      <span class="slot-num">01</span>
      <div class="slot-icon">+</div>
      <div class="slot-label">사진 추가</div>
    </div>

    <div class="photo-slot" id="slot1">
      <input type="file" accept="image/*" data-slot="1">
      <span class="slot-num">02</span>
      <div class="slot-icon">+</div>
      <div class="slot-label">사진 추가</div>
    </div>

    <div class="photo-slot" id="slot2">
      <input type="file" accept="image/*" data-slot="2">
      <span class="slot-num">03</span>
      <div class="slot-icon">+</div>
      <div class="slot-label">사진 추가</div>
    </div>

  </div>

  <!-- Count dots -->
  <div class="upload-count" id="uploadCount">
    <div class="count-dot" id="dot0"></div>
    <div class="count-dot" id="dot1"></div>
    <div class="count-dot" id="dot2"></div>
  </div>

  <p class="upload-hint">최대 3장까지 동시에 분석이 가능해요</p>

  <button class="cta-primary" id="ctaBtn" disabled>
    정밀 분석 시작하기 →
  </button>
  <p class="cta-token-label" id="tokenLabel"></p>

</div>

<script>
(function () {
  var uploaded = [false, false, false];

  function updateUI() {
    var count = uploaded.filter(Boolean).length;
    uploaded.forEach(function (v, i) {
      document.getElementById('dot' + i).classList.toggle('filled', v);
    });
    var btn = document.getElementById('ctaBtn');
    var label = document.getElementById('tokenLabel');
    if (count >= 1) {
      btn.classList.add('ready');
      btn.disabled = false;
      label.textContent = '🪙 ' + (count * 3) + '토큰';
    } else {
      btn.classList.remove('ready');
      btn.disabled = true;
      label.textContent = '';
    }
  }

  document.querySelectorAll('.photo-slot input[type="file"]').forEach(function (input) {
    input.addEventListener('change', function (e) {
      var idx   = parseInt(input.dataset.slot);
      var file  = e.target.files[0];
      var slot  = document.getElementById('slot' + idx);
      if (!file) return;

      var reader = new FileReader();
      reader.onload = function (ev) {
        // Clear slot contents and show preview
        slot.innerHTML = '';
        slot.classList.add('uploaded');

        var img = document.createElement('img');
        img.className = 'slot-preview';
        img.src = ev.target.result;
        slot.appendChild(img);

        // Remove button
        var rm = document.createElement('div');
        rm.className = 'remove-btn';
        rm.textContent = '✕';
        rm.addEventListener('click', function (ev) {
          ev.stopPropagation();
          slot.classList.remove('uploaded');
          slot.innerHTML =
            '<input type="file" accept="image/*" data-slot="' + idx + '">' +
            '<span class="slot-num">0' + (idx + 1) + '</span>' +
            '<div class="slot-icon">+</div>' +
            '<div class="slot-label">사진 추가</div>';
          // Re-bind new input
          slot.querySelector('input').addEventListener('change', arguments.callee);
          uploaded[idx] = false;
          updateUI();
        });
        slot.appendChild(rm);

        uploaded[idx] = true;
        updateUI();
      };
      reader.readAsDataURL(file);
    });
  });

  updateUI();
})();
</script>

</body>
</html>
