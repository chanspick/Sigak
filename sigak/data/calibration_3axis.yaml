# SIGAK 3-Axis Calibration Data
# coordinate.py 는 이 파일에서만 observed_ranges 를 로드한다.
# 재캘리브레이션 시 이 파일만 교체하면 전체 반영.
#
# Structure (2026-04-21 Phase A.1 clean rebuild):
#   observed_ranges.female — SCUT-FBP5500 AF clean IF-only (MediaPipe 혼입 제거)
#   observed_ranges.male   — SCUT-FBP5500 AM clean IF-only
#
# 이전 YAML 오염 상태:
#   - AF (2026-04-08): MediaPipe 폴백 활성 상태에서 수집 → 791 MP 샘플 혼입.
#     lip_fullness/eye_tilt 등 11개 metric 이 두 엔진 scale 혼합 분포였음.
#   - AM (2026-04-21 초기): face_length_ratio np.float32 reject 로 n=0,
#     brow_eye_distance METRICS 리스트 누락으로 수집 실패. 양쪽 모두 proxy 사용.
#
# 수정 내용 (2026-04-21):
#   1. sigak/pipeline/face.py:495 — face_length_ratio 에 float() cast 추가
#      (np.float32 → Python float 강제, isinstance 체크 통과)
#   2. sigak/scripts/calibrate_face_stats.py — METRICS_TO_CALIBRATE 에
#      brow_eye_distance 추가
#   3. AF/AM 둘 다 현재 face.py (InsightFace-only, MediaPipe 폴백 비활성) 로
#      재calibration. 모든 axis feature 가 단일 엔진 · 단일 scale 에서 수집.
#
# coordinate.py::compute_coordinates(features, gender) 가 gender 별로 분기.
# gender 에 해당하는 섹션이 없거나 feature range 가 null 이면 CoordinateConfigError
# 를 raise (silent {0,0,0} 금지 — 미캘리브레이션 상태에서 왜곡된 좌표 산출 차단).

