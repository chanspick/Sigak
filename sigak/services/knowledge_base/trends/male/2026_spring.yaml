# Phase G seed 2건 + Track C 확장 20건 = 총 22건.
# 좌표: 0~1 외부 스케일 (VisualCoordinate 와 동일. CLAUDE.md §4.4/12.1).
# 변환 공식: external = (internal_trend_data + 1) / 2
